name: Build Unsigned IPA

on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  build:
    name: Build Unsigned IPA
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen &> /dev/null; then
            HOMEBREW_NO_AUTO_UPDATE=1 brew install xcodegen
          fi

      - name: Clone libtorrent C++ library
        run: |
          if [ ! -d "DirXploreNative/Thirdparty/libtorrent/CMakeLists.txt" ]; then
            rm -rf DirXploreNative/Thirdparty/libtorrent
            git clone --depth 1 --branch v2.0.11 \
              https://github.com/arvidn/libtorrent.git \
              DirXploreNative/Thirdparty/libtorrent
          fi

      - name: Build C++ libtorrent
        working-directory: DirXploreNative
        run: |
          bash make.sh
          xcrun xcodebuild -project libtorrent-build/libtorrent.xcodeproj \
            -scheme libtorrent \
            -sdk iphoneos \
            -configuration Release \
            build CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO \
            CLANG_CXX_LANGUAGE_STANDARD="c++14" \
            HEADER_SEARCH_PATHS="$(pwd)/Thirdparty/libtorrent/include"
          mkdir -p libtorrent-build/Release-iphoneos
          find libtorrent-build -name "*.a" -exec cp {} libtorrent-build/Release-iphoneos/ \;

      - name: Generate Xcode project
        working-directory: DirXploreNative
        run: bash setup.sh

      - name: Archive unsigned
        working-directory: DirXploreNative
        run: |
          xcrun xcodebuild archive \
            -project DirXplore.xcodeproj \
            -scheme DirXplore \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/DirXplore.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            CLANG_ENABLE_MODULES=YES \
            CLANG_ENABLE_OBJC_WEAK=YES \
            SWIFT_VERSION=6.0 \
            SWIFT_OBJC_BRIDGING_HEADER="$(pwd)/LibTorrent/Bridging-Header.h" \
            LIBRARY_SEARCH_PATHS="$(pwd)/libtorrent-build/Release-iphoneos $(pwd)/libtorrent-build" \
            HEADER_SEARCH_PATHS="$(pwd)/Thirdparty/libtorrent/include $(pwd)/LibTorrent $(pwd)/LibTorrent/Core $(pwd)/LibTorrent/Core/Session $(pwd)/LibTorrent/Core/TorrentHandle $(pwd)/LibTorrent/Core/TorrentHandleSnapshot $(pwd)/LibTorrent/Core/TorrentTracker $(pwd)/LibTorrent/Core/TorrentFile $(pwd)/LibTorrent/Core/TorrentFile/File $(pwd)/LibTorrent/Core/TorrentFile/Magnet $(pwd)/LibTorrent/Core/TorrentFile/Downloadable $(pwd)/LibTorrent/Core/FileEntry $(pwd)/LibTorrent/Core/SessionSettings $(pwd)/LibTorrent/Utils" \
            OTHER_LDFLAGS="$(inherited) -lz -liconv -all_load"
        continue-on-error: true

      - name: Export unsigned IPA
        working-directory: DirXploreNative
        run: |
          mkdir -p build/ipa
          cat > build/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Development</string>
            <key>provisioningProfiles</key>
            <dict/>
            <key>teamID</key>
            <string></string>
            <key>compileBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <false/>
          </dict>
          </plist>
          EOF
          if [ -d "build/DirXplore.xcarchive" ]; then
            xcrun xcodebuild -exportArchive \
              -archivePath build/DirXplore.xcarchive \
              -exportPath build/ipa \
              -exportOptionsPlist build/ExportOptions.plist \
              -allowProvisioningUpdates NO
          else
            echo "Archive not found. Building app without archive..."
            xcrun xcodebuild build \
              -project DirXplore.xcodeproj \
              -scheme DirXplore \
              -sdk iphoneos \
              -configuration Release \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO \
              DEVELOPMENT_TEAM=""
            # Create basic IPA structure
            mkdir -p build/ipa/Payload
            find build/Release-iphoneos -name "*.app" -exec cp -R {} build/ipa/Payload/ \;
            cd build/ipa && zip -r DirXplore.ipa Payload/ && cd ../..
          fi

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: DirXplore-Unsigned
          path: DirXploreNative/build/ipa/*.ipa
          if-no-files-found: warn
