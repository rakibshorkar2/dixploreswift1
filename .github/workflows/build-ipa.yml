name: Build Unsigned IPA

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build DirXplore IPA
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Show buildable schemes
        run: xcodebuild -list -project DirXplore.xcodeproj

      - name: Build archive
        run: |
          xcodebuild clean archive \
            -project DirXplore.xcodeproj \
            -scheme DirXplore \
            -configuration Release \
            -archivePath DirXplore.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Create unsigned IPA from archive
        run: |
          mkdir -p output/Payload
          cp -r "DirXplore.xcarchive/Products/Applications/DirXplore.app" output/Payload/
          cd output
          zip -qr DirXplore_unsigned.ipa Payload/
          rm -rf Payload

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          name: DirXplore ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            ./output/DirXplore_unsigned.ipa
